apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "csv-processor.fullname" . }}
  labels:
    {{- include "csv-processor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "csv-processor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "csv-processor.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http-app
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "csv-processor.fullname" . }}-config
          volumeMounts:
            - name: public-files
              mountPath: /shared/public
            - name: aws-credentials
              mountPath: {{ .Values.awsCredentialsSecret.mountPath }}
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http-app
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-app
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}
        - name: nginx
          image: {{ .Values.nginx.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: public-files
              mountPath: /shared/public
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
      volumes:
        - name: public-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "csv-processor.fullname" . }}-nginx
        - name: aws-credentials
          secret:
            secretName: {{ .Values.awsCredentialsSecret.name }}

